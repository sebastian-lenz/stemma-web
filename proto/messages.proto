syntax = "proto3";

import "trinkey.proto";
import "neo_driver.proto";
import "rotary_encoder.proto";
import "linear_encoder.proto";
import "touch_sensor.proto";
import "gyroscope.proto";
import "pressure_sensor.proto";
import "co2_sensor.proto";
import "distance_sensor.proto";
import "uv_sensor.proto";
import "nfc_tag.proto";
import "rfid_reader.proto";
import "device_type.proto";

// ── Commands: host → device ──────────────────────────────────────────────────

message Command {
    uint32 id = 1;

    oneof payload {
        // StemmaQT device commands
        DeviceCommand device_command = 5;
    }
}

// ── StemmaQT device commands ──────────────────────────────────────────────────

message DeviceCommand {
    DeviceType type    = 1;
    uint32     address = 2;

    oneof payload {
        // Lifecycle
        StartDevice    start     = 3;
        StopDevice     stop      = 4;
        GetDeviceState get_state = 5;
        // NeoPixel controls (Trinkey, NeoDriver, RotaryEncoder, LinearEncoder)
        SetBrightness  set_brightness   = 6;
        SetPixelColor  set_pixel_color  = 7;
        SetPixelColors set_pixel_colors = 8;
        // NeoDriver-specific
        SetNeoDriverLength set_length = 9;
        // Gyroscope configuration
        SetAccelerationRange set_accel_range = 10;
        SetRotationRange     set_rot_range   = 11;
        SetAccelerationRate  set_accel_rate  = 12;
        SetRotationRate      set_rot_rate    = 13;
        // PressureSensor configuration
        SetPressureSensorDataRate set_pressure_rate = 14;
        // UVSensor configuration
        SetUVSensorGain       set_uv_gain       = 15;
        SetUVSensorMode       set_uv_mode       = 16;
        SetUVSensorResolution set_uv_resolution = 17;
        // NFC Tag write commands
        NFCWriteText         nfc_write_text          = 20;
        NFCWriteUri          nfc_write_uri           = 21;
        NFCWriteUnabridgedUri nfc_write_unabridged_uri = 22;
        NFCWriteSms          nfc_write_sms           = 23;
        NFCWriteEmail        nfc_write_email         = 24;
        NFCWriteGeoLocation  nfc_write_geo           = 25;
        NFCWriteVCard        nfc_write_vcard         = 26;
    }
}

message StartDevice {
    // Only populated when starting a Gyroscope
    GyroscopeChipset gyroscope_chipset = 1;
    // Only populated when starting a PressureSensor
    PressureSensorChipset pressure_sensor_chipset = 2;
}
message StopDevice     {}
message GetDeviceState {}

message SetBrightness      { uint32 brightness = 1; }
message SetPixelColor      { uint32 index = 1; uint32 color = 2; }
// colors is capped to 64 entries via messages.options
message SetPixelColors     { uint32 offset = 1; bytes colors = 2; bool show = 3; }
message SetNeoDriverLength { uint32 length = 1; }

message SetAccelerationRange { AccelerationRange range = 1; }
message SetRotationRange     { RotationRange     range = 1; }
message SetAccelerationRate  { DataRate          rate  = 1; }
message SetRotationRate      { DataRate          rate  = 1; }

message SetPressureSensorDataRate { PressureSensorDataRate rate = 1; }
message SetUVSensorGain           { UVSensorGain           gain = 1; }
message SetUVSensorMode           { UVSensorMode           mode = 1; }
message SetUVSensorResolution     { UVSensorResolution     resolution = 1; }

// ── Responses: device → host ─────────────────────────────────────────────────

message Error {
    string message = 1;
}

message Response {
    uint32 id      = 1;  // echoes Command.id; 0 for unsolicited events
    bool   success = 2;

    oneof payload {
        DeviceState device_state = 3;
        DeviceEvent device_event = 4;
        Error       error        = 5;
    }
}

// ── Device state response ─────────────────────────────────────────────────────

message DeviceState {
    DeviceType type      = 1;
    uint32     address   = 2;
    bool       connected = 3;

    oneof state {
        CO2SensorState      co2_sensor      = 4;
        DistanceSensorState distance_sensor = 5;
        GyroscopeState      gyroscope       = 6;
        LinearEncoderState  linear_encoder  = 7;
        NeoDriverState      neo_driver      = 8;
        NFCTagState         nfc_tag         = 9;
        PressureSensorState pressure_sensor = 10;
        RFIDReaderState     rfid_reader     = 11;
        RotaryEncoderState  rotary_encoder  = 12;
        TrinkeyState        trinkey         = 13;
        TouchSensorState    touch_sensor    = 14;
        UVSensorState       uv_sensor       = 15;
    }
}

// ── Device events (unsolicited, id = 0) ──────────────────────────────────────

message DeviceEvent {
    DeviceType type    = 1;
    uint32     address = 2;

    oneof event {
        CO2SensorData        co2_sensor_data       = 3;
        DistanceSensorData   distance_sensor_data  = 4;
        GyroscopeChanged     gyroscope_data        = 5;
        LinearEncoderChanged linear_changed        = 6;
        PressureSensorData   pressure_sensor_data  = 7;
        RFIDReaderData       rfid_reader_data      = 8;
        RotaryEncoderButton  rotary_button         = 9;
        RotaryEncoderChanged rotary_changed        = 10;
        TouchSensorButton    touch_button          = 11;
        UVSensorData         uv_sensor_data        = 12;
    }
}
