syntax = "proto3";

import "shared.proto";

// ── Gyroscope messages ────────────────────────────────────────────────────────

// State returned by GetDeviceState for a Gyroscope.
message GyroscopeState {
    Vector3           acceleration          = 1;
    Vector3           rotation              = 2;
    float             temperature           = 3;
    DataRate          acceleration_data_rate = 4;
    DataRate          rotation_data_rate    = 5;
    AccelerationRange acceleration_range    = 6;
    RotationRange     rotation_range        = 7;
}

// Unsolicited event — sent at the configured data rate.
message GyroscopeChanged {
    Vector3 acceleration = 1;
    Vector3 rotation     = 2;
    float   temperature  = 3;
}

// ── Gyroscope-specific enumerations ──────────────────────────────────────────

// Which physical chip is soldered on the board.
enum GyroscopeChipset {
    GYROSCOPE_CHIPSET_UNSPECIFIED = 0;
    GYROSCOPE_CHIPSET_LSM6DSOX   = 1;
    GYROSCOPE_CHIPSET_ISM330DHCX = 2;
    GYROSCOPE_CHIPSET_LSM6DSO32  = 3;
}

// Output-data rates (sequential IDs; firmware maps to driver constants).
enum DataRate {
    DATA_RATE_SHUTDOWN  = 0;
    DATA_RATE_HZ_12_5   = 1;
    DATA_RATE_HZ_26     = 2;
    DATA_RATE_HZ_52     = 3;
    DATA_RATE_HZ_104    = 4;
    DATA_RATE_HZ_208    = 5;
    DATA_RATE_HZ_416    = 6;
    DATA_RATE_HZ_833    = 7;
    DATA_RATE_HZ_1_66K  = 8;
    DATA_RATE_HZ_3_33K  = 9;
    DATA_RATE_HZ_6_66K  = 10;
}

enum AccelerationRange {
    ACCELERATION_RANGE_4_G  = 0;
    ACCELERATION_RANGE_8_G  = 1;
    ACCELERATION_RANGE_16_G = 2;
    ACCELERATION_RANGE_32_G = 3;
}

enum RotationRange {
    ROTATION_RANGE_DPS_125  = 0;
    ROTATION_RANGE_DPS_250  = 1;
    ROTATION_RANGE_DPS_500  = 2;
    ROTATION_RANGE_DPS_1000 = 3;
    ROTATION_RANGE_DPS_2000 = 4;
    ROTATION_RANGE_DPS_4000 = 5;
}
