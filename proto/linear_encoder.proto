syntax = "proto3";

// State returned by GetDeviceState for a LinearEncoder (NeoSlider).
// pixels is capped to 4 via linear_encoder.options.
message LinearEncoderState {
    uint32          brightness = 1;
    bytes           pixels     = 2;  // 3 bytes/color, max 12 bytes, see linear_encoder.options
    uint32          value      = 3;  // slider position 0–1023
}

// Unsolicited event — sent whenever the slider moves.
message LinearEncoderChanged {
    uint32 value = 1;  // 0–1023
}
