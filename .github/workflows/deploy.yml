name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pipx install platformio

      - name: Build firmware
        run: pio run
        working-directory: firmware

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/.pio/build/adafruit_trinkey_qt2040/firmware.uf2

  build-site:
    runs-on: ubuntu-latest
    needs: build-firmware
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            library/package-lock.json
            site/package-lock.json

      - name: Install library dependencies
        run: npm install
        working-directory: library

      - name: Build library
        run: npm run build
        working-directory: library

      - name: Install site dependencies
        run: npm install
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site
        env:
          BASE_PATH: /stemma-web

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: site/build/download

      - name: Copy library dist to download folder
        run: cp library/dist/stemma-web.js library/dist/stemma-web.umd.cjs library/dist/stemma-web.p5.js site/build/download/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
