; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_trinkey_qt2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_trinkeyrp2040qt
framework = arduino
board_build.core = earlephilhower
build_flags = -DUSE_TINYUSB
upload_protocol = picotool
custom_nanopb_protos = +<../proto/*.proto>
lib_deps =
	Nanopb
	adafruit/Adafruit BusIO
	adafruit/Adafruit LSM6DS
	adafruit/Adafruit LPS2X
	adafruit/Adafruit LTR390 Library
	adafruit/Adafruit MPR121
	adafruit/Adafruit NeoPixel
	adafruit/Adafruit seesaw Library
	adafruit/Adafruit Unified Sensor
	adafruit/Adafruit_VL53L0X
	https://github.com/SolderedElectronics/Soldered-RFID-Reader-125kHz-Arduino-Library
	https://github.com/Sensirion/arduino-i2c-scd4x
	https://github.com/stm32duino/ST25DV
